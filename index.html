<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
        body{background:#0F172A;color:#F8FAFC;display:flex;align-items:center;justify-content:center;min-height:100vh}
        .card{background:#1E293B;padding:40px;border-radius:24px;width:90%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
        .card h2{color:#10B981;text-align:center;margin-bottom:8px;font-size:28px}
        .card p{text-align:center;color:#94A3B8;margin-bottom:24px}
        .field{margin-bottom:16px}
        .field input{width:100%;padding:14px;border:2px solid #334155;border-radius:12px;background:#0F172A;color:#F8FAFC;font-size:16px;outline:none;transition:.3s}
        .field input:focus{border-color:#10B981}
        .btn{width:100%;padding:14px;border:none;border-radius:12px;background:#10B981;color:#fff;font-size:18px;font-weight:700;cursor:pointer;transition:.3s}
        .btn:hover{background:#059669}
        .btn:disabled{opacity:.6;cursor:not-allowed}
        .err{background:#7F1D1D;color:#FCA5A5;padding:12px;border-radius:8px;margin-top:12px;display:none;text-align:center}
    </style>
</head>
<body>
<div class="card">
    <h2>⚙️ لوحة التحكم</h2>
    <p>أدخل بيانات الأدمن للدخول</p>
    <div class="field"><input type="email" id="email" placeholder="البريد الإلكتروني"></div>
    <div class="field"><input type="password" id="pass" placeholder="كلمة المرور"></div>
    <button class="btn" id="loginBtn" onclick="login()">دخول</button>
    <div class="err" id="err"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
    apiKey: 'AIzaSyDlY3cXLhUTA90hm4W-ciYXFgNGGt5lLf0',
    appId: '1:416921782729:web:b6ef2937c0f21c36930018',
    messagingSenderId: '416921782729',
    projectId: 'remon-c7d79',
    authDomain: 'remon-c7d79.firebaseapp.com',
    databaseURL: 'https://remon-c7d79-default-rtdb.firebaseio.com',
    storageBucket: 'remon-c7d79.firebasestorage.app',
    measurementId: 'G-CPXH58TKN3'
});
const auth=firebase.auth(),db=firebase.database();

auth.onAuthStateChanged(u=>{if(u) db.ref('admins/'+u.uid).once('value',s=>{if(s.exists()) location.href='dashboard.html'})});

async function login(){
    const e=document.getElementById('email').value,p=document.getElementById('pass').value,btn=document.getElementById('loginBtn'),err=document.getElementById('err');
    if(!e||!p){err.textContent='أدخل البريد وكلمة المرور';err.style.display='block';return}
    btn.disabled=true;btn.textContent='جاري الدخول...';err.style.display='none';
    try{
        const cred=await auth.signInWithEmailAndPassword(e,p);
        const snap=await db.ref('admins/'+cred.user.uid).once('value');
        if(snap.exists()){location.href='dashboard.html'}
        else{err.textContent='هذا الحساب ليس أدمن';err.style.display='block';auth.signOut()}
    }catch(x){err.textContent='بيانات الدخول غير صحيحة';err.style.display='block'}
    btn.disabled=false;btn.textContent='دخول';
}
document.getElementById('pass').addEventListener('keypress',e=>{if(e.key==='Enter')login()});
</script>
</body>
</html>
